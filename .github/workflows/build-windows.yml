name: Build SeqDPI Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/**

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build windowed EXE
        shell: pwsh
        run: ./build_exe.ps1

      - name: Upload SeqDPI.exe
        uses: actions/upload-artifact@v4
        with:
          name: SeqDPI-windows-exe
          path: dist/SeqDPI.exe
