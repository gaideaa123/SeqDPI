name: Build SeqDPI Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/**

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build SeqDPI setup wizard
        shell: pwsh
        run: ./build_installer.ps1

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SeqDPI-Setup
          path: dist/installer/SeqDPI-Setup.exe

      - name: Upload raw exe for debugging
        uses: actions/upload-artifact@v4
        with:
          name: SeqDPI-raw-exe
          path: dist/SeqDPI.exe
